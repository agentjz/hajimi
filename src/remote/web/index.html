<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#d7efff" />
    <title>哈基米远程</title>
    <link rel="stylesheet" href="/assets/remote.css" />
    <script type="module" src="/assets/remote.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <div class="header-actions">
          <span class="pill" id="stream-pill">连接中</span>
          <span class="pill accent" id="run-pill">空闲</span>
          <button class="topbar-button" id="new-conversation-button" type="button">新建对话</button>
        </div>
      </header>

      <main class="chat-shell">
        <div class="chat-scroll" id="chat-scroll">
          <div class="timeline" id="timeline"></div>
        </div>

        <form class="composer" id="composer-form">
          <textarea
            id="prompt-input"
            rows="1"
            aria-label="消息输入框"
            placeholder="发送消息..."
          ></textarea>

          <div class="composer-bar">
            <p class="composer-note" id="composer-note">正在连接远程聊天页...</p>

            <div class="composer-actions">
              <button class="secondary-button" id="stop-button" type="button">停止</button>
              <button class="primary-button" id="send-button" type="submit">发送</button>
            </div>
          </div>
        </form>
      </main>
    </div>
  </body>
</html>
